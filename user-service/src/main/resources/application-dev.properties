server.port=8082

spring.application.name=user-service

# DATABASE CONFIG
spring.datasource.url=jdbc:postgresql://localhost:5432/medirevolution_user
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HIKARI CONNECTION POOL - VERY IMPORTANT FOR MULTIPLE MICROSERVICES
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000


# File Upload Directory
file.upload-dir=${UPLOAD_DIR:uploads/user-service}

# Multipart File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# EUREKA CONFIG
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# JWT CONFIG
jwt.secret=7f4b5f12e1d64df1a8a7d19e6d3b91a87f4b5f12e1d64df1a8a7d19e6d3b91a8