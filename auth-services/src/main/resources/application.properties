server.port=${PORT:8081}

spring.application.name=auth-service

# DATABASE CONFIG
spring.datasource.url=${AUTH_DB_URL:jdbc:postgresql://localhost:5432/medirevolution_auth}
spring.datasource.username=${AUTH_DB_USERNAME:postgres}
spring.datasource.password=${AUTH_DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=auth_service
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

