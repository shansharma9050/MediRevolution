phonepe.base-url=${PHONEPE_BASE_URL:https://api-preprod.phonepe.com/apis/pg-sandbox}
phonepe.client-id=${PHONEPE_CLIENT_ID:M22ZRFX2Q40BX_2606151756}
phonepe.client-secret=${PHONEPE_CLIENT_SECRET:NmZlOWRhOWMtMTBmYy00NTAwLWE4MDgtMDgzZmIyYzkzYzhi}
phonepe.client-version=${PHONEPE_CLIENT_VERSION:1}

