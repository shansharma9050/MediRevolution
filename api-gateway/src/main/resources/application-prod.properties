# ===============================
# API GATEWAY BASIC CONFIG
# ===============================

server.port=${PORT:8080}
spring.application.name=api-gateway


# ===============================
# DISABLE EUREKA / DISCOVERY
# Render Free direct URL routing
# ===============================

eureka.client.enabled=false
spring.cloud.discovery.enabled=false


# ===============================
# AUTH SERVICE
# ===============================

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**


# ===============================
# USER SERVICE
# ===============================

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=${USER_SERVICE_URL}
spring.cloud.gateway.routes[1].predicates[0]=Path=/users/**


# ===============================
# MEDICINE SERVICE
# ===============================

spring.cloud.gateway.routes[2].id=medicine-service
spring.cloud.gateway.routes[2].uri=${MEDICINE_SERVICE_URL}
spring.cloud.gateway.routes[2].predicates[0]=Path=/medicines/**


# ===============================
# ORDER SERVICE
# ===============================

spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=${ORDER_SERVICE_URL}
spring.cloud.gateway.routes[3].predicates[0]=Path=/orders/**


# ===============================
# BILLING SERVICE
# ===============================

spring.cloud.gateway.routes[4].id=billing-service
spring.cloud.gateway.routes[4].uri=${BILLING_SERVICE_URL}
spring.cloud.gateway.routes[4].predicates[0]=Path=/billing/**


# ===============================
# DOCTOR SERVICE
# ===============================

spring.cloud.gateway.routes[5].id=doctor-service
spring.cloud.gateway.routes[5].uri=${DOCTOR_SERVICE_URL}
spring.cloud.gateway.routes[5].predicates[0]=Path=/doctor/**


# ===============================
# HOSPITAL SERVICE
# ===============================

spring.cloud.gateway.routes[6].id=hospital-service
spring.cloud.gateway.routes[6].uri=${HOSPITAL_SERVICE_URL}
spring.cloud.gateway.routes[6].predicates[0]=Path=/hospital/**


# ===============================
# CORS CONFIG
# ===============================

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=${FRONTEND_URL}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposedHeaders=Set-Cookie,Authorization
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600


# ===============================
# RENDER / HTTPS PROXY
# ===============================

server.forward-headers-strategy=framework


# ===============================
# ACTUATOR
# ===============================

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always


# ===============================
# TIMEOUT
# ===============================

spring.cloud.gateway.httpclient.connect-timeout=10000
spring.cloud.gateway.httpclient.response-timeout=60s


# ===============================
# LOGGING
# ===============================

logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty.http.client=INFO
logging.level.org.springframework.web=INFO