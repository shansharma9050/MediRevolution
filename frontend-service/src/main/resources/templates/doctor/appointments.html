<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>MediRevolution | Appointments</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="manifest" href="/manifest.json">
	<meta name="theme-color" content="#05285f">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body class="dashboard-body">

	<nav class="navbar fixed-top mr-navbar px-3 px-lg-4">
		<div class="d-flex align-items-center gap-3">
			<button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
			<a href="/dashboard" class="mr-navbar-brand d-flex align-items-center gap-2">
				<img th:src="@{/images/logo.png}" class="mr-nav-logo"> Medi<span>Revolution</span>
			</a>
		</div>
		<div class="d-flex align-items-center gap-3">
			<div class="mr-user-pill"><span id="userEmail">doctor@email.com</span></div>
			<button class="btn btn-light position-relative" onclick="window.location='/notifications'">
				🔔 <span id="notificationCount"
					class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
			</button>
			<button class="btn btn-outline-light" onclick="logout()">Logout</button>
		</div>
	</nav>

	<aside class="mr-sidebar" id="sidebar">
		<a href="/dashboard">🏠 Main Dashboard</a>
		<a href="/doctor/dashboard">🩺 Doctor Dashboard</a>
		<a href="/doctor/patients">👨‍⚕️ Patients</a>
		<a href="/doctor/prescriptions">💊 Prescriptions</a>
		<a href="/doctor/appointments" class="active">📅 Appointments</a>
		<a href="/doctor/reports">📊 Doctor Reports</a>
		<a href="/notifications">🔔 Notifications</a>
		<a href="/profile">👤 Profile</a>
	</aside>

	<main class="mr-main">

		<div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
			<div>
				<h1 class="mr-page-title">Appointment Booking</h1>
				<p class="mr-page-subtitle">Book, confirm, complete and cancel patient appointments.</p>
			</div>

			<button class="btn btn-medi" style="width:auto;" onclick="toggleAppointmentForm()">+ Book
				Appointment</button>
		</div>

		<div id="msg"></div>

		<div class="mr-card mb-4" id="appointmentFormPanel" style="display:none;">
			<h5 class="fw-bold text-primary mb-3">Book Appointment</h5>

			<div class="row g-3">
				<div class="col-md-6">
					<label class="form-label">Patient</label>
					<select id="patientId" class="form-select"></select>
				</div>

				<div class="col-md-3">
					<label class="form-label">Date</label>
					<input type="date" id="appointmentDate" class="form-control">
				</div>

				<div class="col-md-3">
					<label class="form-label">Time</label>
					<input type="time" id="appointmentTime" class="form-control">
				</div>

				<div class="col-md-12">
					<label class="form-label">Purpose</label>
					<textarea id="purpose" class="form-control" rows="2"></textarea>
				</div>

				<div class="col-md-12 text-end">
					<button class="btn btn-medi" style="width:auto;" onclick="createAppointment()">Save
						Appointment</button>
				</div>
			</div>
		</div>

		<div class="mr-card">
			<div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
				<h5 class="fw-bold text-primary mb-0">Appointment List</h5>

				<select id="statusFilter" class="form-select" style="max-width:230px;" onchange="filterAppointments()">
					<option value="">All Status</option>
					<option value="REQUESTED">Requested</option>
					<option value="CONFIRMED">Confirmed</option>
					<option value="COMPLETED">Completed</option>
					<option value="CANCELLED">Cancelled</option>
				</select>
			</div>

			<div id="appointmentList"></div>
		</div>

	</main>

	<script th:src="@{/js/common-dashboard.js}"></script>
	<script th:src="@{/js/doctor-appointments.js}"></script>
	<script th:src="@{/js/pwa.js}"></script>

</body>

</html>
