<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>MediRevolution | Prescriptions</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="manifest" href="/manifest.json">
	<meta name="theme-color" content="#05285f">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body class="dashboard-body">

	<nav class="navbar fixed-top mr-navbar px-3 px-lg-4">
		<div class="d-flex align-items-center gap-3">
			<button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
			<a href="/dashboard" class="mr-navbar-brand d-flex align-items-center gap-2">
				<img th:src="@{/images/logo.png}" class="mr-nav-logo"> Medi<span>Revolution</span>
			</a>
		</div>
		<div class="d-flex align-items-center gap-3">
			<div class="mr-user-pill"><span id="userEmail">doctor@email.com</span></div>
			<button class="btn btn-light position-relative" onclick="window.location='/notifications'">
				🔔 <span id="notificationCount"
					class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
			</button>
			<button class="btn btn-outline-light" onclick="logout()">Logout</button>
		</div>
	</nav>

	<aside class="mr-sidebar" id="sidebar">
		<a href="/dashboard">🏠 Main Dashboard</a>
		<a href="/doctor/dashboard">🩺 Doctor Dashboard</a>
		<a href="/doctor/patients">👨‍⚕️ Patients</a>
		<a href="/doctor/prescriptions" class="active">💊 Prescriptions</a>
		<a href="/doctor/appointments">📅 Appointments</a>
		<a href="/doctor/reports">📊 Doctor Reports</a>
		<a href="/notifications">🔔 Notifications</a>
		<a href="/profile">👤 Profile</a>
	</aside>

	<main class="mr-main">

		<div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
			<div>
				<h1 class="mr-page-title">Prescription Management</h1>
				<p class="mr-page-subtitle">Create prescriptions with symptoms, diagnosis, medicines and advice.</p>
			</div>

			<button class="btn btn-medi" style="width:auto;" onclick="togglePrescriptionForm()">+ Create
				Prescription</button>
		</div>

		<div id="msg"></div>

		<div class="mr-card mb-4" id="prescriptionFormPanel" style="display:none;">
			<h5 class="fw-bold text-primary mb-3">New Prescription</h5>

			<div class="row g-3">
				<div class="col-md-6">
					<label class="form-label">Select Patient</label>
					<select id="patientId" class="form-select"></select>
				</div>

				<div class="col-md-12">
					<label class="form-label">Symptoms</label>
					<textarea id="symptoms" class="form-control" rows="2"></textarea>
				</div>

				<div class="col-md-12">
					<label class="form-label">Diagnosis</label>
					<textarea id="diagnosis" class="form-control" rows="2"></textarea>
				</div>

				<div class="col-md-12">
					<label class="form-label">Medicines</label>
					<textarea id="medicines" class="form-control" rows="4"
						placeholder="Dolo 650 - 1 tablet twice daily for 3 days"></textarea>
				</div>

				<div class="col-md-12">
					<label class="form-label">Advice</label>
					<textarea id="advice" class="form-control" rows="2"></textarea>
				</div>

				<div class="col-md-12 text-end">
					<button class="btn btn-medi" style="width:auto;" onclick="createPrescription()">Save
						Prescription</button>
				</div>
			</div>
		</div>

		<div class="mr-card">
			<h5 class="fw-bold text-primary mb-3">Prescription List</h5>
			<div id="prescriptionList"></div>
		</div>

	</main>

	<script th:src="@{/js/common-dashboard.js}"></script>
	<script th:src="@{/js/doctor-prescriptions.js}"></script>
	<script th:src="@{/js/pwa.js}"></script>

</body>

</html>
