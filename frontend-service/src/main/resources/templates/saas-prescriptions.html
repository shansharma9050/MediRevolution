<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>MediRevolution | SaaS Prescriptions</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="manifest" href="/manifest.json">
	<meta name="theme-color" content="#05285f">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body class="dashboard-body">

	<div th:replace="~{layout/saas-topnavbar :: saasTopnavbar}"></div>
	<div th:replace="~{layout/saas-sidebar :: saasSidebar}"></div>

	<main class="mr-main">

		<div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
			<div>
				<h1 class="mr-page-title">SaaS Prescriptions / EMR</h1>
				<p class="mr-page-subtitle">
					Create prescriptions and view EMR history for
					<strong id="tenantNameText">your workspace</strong>.
				</p>
			</div>

			<button id="addPrescriptionBtn" class="btn btn-medi" data-bs-toggle="modal"
				data-bs-target="#prescriptionModal" onclick="openCreatePrescriptionModal()">
				Create Prescription
			</button>
		</div>

		<div id="msg"></div>

		<div class="mr-card mb-4">
			<div class="row g-3 align-items-end">
				<div class="col-md-4">
					<label class="form-label">Filter by Patient</label>
					<select id="filterPatientId" class="form-select">
						<option value="">All Patients</option>
					</select>
				</div>

				<div class="col-md-4">
					<label class="form-label">Filter by Doctor</label>
					<select id="filterDoctorProfileId" class="form-select">
						<option value="">All Doctors</option>
					</select>
				</div>

				<div class="col-md-4">
					<button class="btn btn-medi w-100" onclick="applyFilters()">Apply Filter</button>
				</div>
			</div>
		</div>

		<div class="mr-card">
			<div class="table-responsive">
				<table class="table table-hover align-middle">
					<thead>
						<tr>
							<th>Date</th>
							<th>Patient</th>
							<th>Doctor</th>
							<th>Diagnosis</th>
							<th>Follow Up</th>
							<th style="width:220px;">Action</th>
						</tr>
					</thead>
					<tbody id="prescriptionsTableBody">
						<tr>
							<td colspan="6" class="text-center text-muted py-4">
								Loading prescriptions...
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div th:replace="~{layout/footer :: footer}"></div>
	</main>

	<div class="modal fade" id="prescriptionModal" tabindex="-1">
		<div class="modal-dialog modal-xl">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title" id="prescriptionModalTitle">Create Prescription</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<div class="modal-body">

					<div class="row g-3">

						<div class="col-md-4">
							<label class="form-label">Patient *</label>
							<select id="patientId" class="form-select">
								<option value="">Select Patient</option>
							</select>
						</div>

						<div class="col-md-4">
							<label class="form-label">Doctor *</label>
							<select id="doctorProfileId" class="form-select">
								<option value="">Select Doctor</option>
							</select>
						</div>

						<div class="col-md-4">
							<label class="form-label">Appointment ID</label>
							<input type="number" id="appointmentId" class="form-control" placeholder="Optional">
						</div>

						<div class="col-md-3">
							<label class="form-label">Blood Pressure</label>
							<input type="text" id="bloodPressure" class="form-control" placeholder="120/80">
						</div>

						<div class="col-md-3">
							<label class="form-label">Pulse</label>
							<input type="text" id="pulse" class="form-control" placeholder="78">
						</div>

						<div class="col-md-3">
							<label class="form-label">Temperature</label>
							<input type="text" id="temperature" class="form-control" placeholder="98.6">
						</div>

						<div class="col-md-3">
							<label class="form-label">SpO2</label>
							<input type="text" id="spo2" class="form-control" placeholder="99%">
						</div>

						<div class="col-md-3">
							<label class="form-label">Weight</label>
							<input type="text" id="weight" class="form-control" placeholder="70 kg">
						</div>

						<div class="col-md-3">
							<label class="form-label">Height</label>
							<input type="text" id="height" class="form-control" placeholder="170 cm">
						</div>

						<div class="col-md-3">
							<label class="form-label">Sugar Level</label>
							<input type="text" id="sugarLevel" class="form-control" placeholder="110">
						</div>

						<div class="col-md-3">
							<label class="form-label">Follow Up Date</label>
							<input type="date" id="followUpDate" class="form-control">
						</div>

						<div class="col-md-6">
							<label class="form-label">Diagnosis *</label>
							<textarea id="diagnosis" class="form-control" rows="2"></textarea>
						</div>

						<div class="col-md-6">
							<label class="form-label">Clinical Notes</label>
							<textarea id="clinicalNotes" class="form-control" rows="2"></textarea>
						</div>

						<div class="col-md-6">
							<label class="form-label">Advice</label>
							<textarea id="advice" class="form-control" rows="2"></textarea>
						</div>

						<div class="col-md-6">
							<label class="form-label">Lab Tests</label>
							<textarea id="labTests" class="form-control" rows="2"></textarea>
						</div>

						<div class="col-12">
							<label class="form-label">Follow Up Advice</label>
							<textarea id="followUpAdvice" class="form-control" rows="2"></textarea>
						</div>

						<div class="col-12">
							<div class="d-flex justify-content-between align-items-center mt-3">
								<h5 class="mb-0">Medicines</h5>
								<button type="button" class="btn btn-sm btn-outline-primary" onclick="addMedicineRow()">
									Add Medicine
								</button>
							</div>

							<div class="table-responsive mt-2">
								<table class="table table-bordered align-middle">
									<thead>
										<tr>
											<th>Medicine</th>
											<th>Dosage</th>
											<th>Frequency</th>
											<th>Duration</th>
											<th>Instructions</th>
											<th style="width:80px;">Action</th>
										</tr>
									</thead>
									<tbody id="medicineRows"></tbody>
								</table>
							</div>
						</div>

					</div>

				</div>

				<div class="modal-footer">
					<button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
					<button class="btn btn-medi" onclick="savePrescription()">Save Prescription</button>
				</div>

			</div>
		</div>
	</div>

	<script th:src="@{/js/common-dashboard.js}"></script>
	<script th:src="@{/js/module-switch.js}"></script>
	<script th:src="@{/js/saas-auth-guard.js}"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/saas-prescriptions.js}"></script>

</body>

</html>
