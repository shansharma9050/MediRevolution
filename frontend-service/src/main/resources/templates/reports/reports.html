<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>MediRevolution | Reports & Analytics</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<link rel="manifest" href="/manifest.json">

	<meta name="theme-color" content="#05285f">

	<meta name="mobile-web-app-capable" content="yes">

	<meta name="apple-mobile-web-app-capable" content="yes">

	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

	<meta name="apple-mobile-web-app-title" content="MediRevolution">

	<link rel="apple-touch-icon" href="/images/icon-192.png">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body class="dashboard-body">

	<div th:replace="~{layout/topnavbar :: topnavbar}"></div>
	<div th:replace="~{layout/sidebar :: sidebar}"></div>

	<main class="mr-main">

		<div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
			<div>
				<h1 class="mr-page-title">Reports & Analytics</h1>
				<p class="mr-page-subtitle" id="reportSubtitle">
					Business reports and operational analytics.
				</p>
			</div>

			<button class="btn btn-medi" style="width:auto;" onclick="loadReports()">
				Refresh Reports
			</button>
		</div>

		<div id="msg"></div>

		<div class="row g-4 mb-4">

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title" id="rCard1Title">Total Orders</div>
					<div class="mr-stat-value" id="rCard1Value">0</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title" id="rCard2Title">Delivered</div>
					<div class="mr-stat-value" id="rCard2Value">0</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title" id="rCard3Title">Revenue</div>
					<div class="mr-stat-value" id="rCard3Value">0</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title" id="rCard4Title">Pending</div>
					<div class="mr-stat-value" id="rCard4Value">0</div>
				</div>
			</div>

		</div>

		<div class="mr-card mb-4">

			<div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
				<h5 class="fw-bold text-primary mb-0">Report Filters</h5>

				<div class="d-flex gap-2 flex-wrap">
					<select id="reportType" class="form-select" style="max-width:260px;" onchange="switchReportType()">
						<option value="ORDER">Order Report</option>
						<option value="STOCK" data-role="WHOLESALER">Medicine Stock Report</option>
						<option value="INVOICE">Invoice Report</option>
						<option value="PLATFORM" data-role="SUPER_ADMIN">Admin Platform Report</option>
					</select>

					<select id="statusFilter" class="form-select" style="max-width:220px;"
						onchange="renderCurrentReport()">
						<option value="">All Status</option>
						<option value="PENDING">Pending</option>
						<option value="ACCEPTED">Accepted</option>
						<option value="REJECTED">Rejected</option>
						<option value="DELIVERED">Delivered</option>
					</select>

					<button class="btn btn-outline-secondary" onclick="exportReportCsv()">
						Export CSV
					</button>
				</div>
			</div>

		</div>

		<div class="row g-4">

			<div class="col-lg-8">
				<div class="mr-card">
					<h5 class="fw-bold text-primary mb-3" id="mainReportTitle">Order Report</h5>
					<div id="reportTableContainer"></div>
				</div>
			</div>

			<div class="col-lg-4">
				<div class="mr-card">
					<h5 class="fw-bold text-primary mb-3">Analytics Summary</h5>
					<div id="analyticsSummary"></div>
				</div>
			</div>

		</div>

		<div th:replace="~{layout/footer :: footer}"></div>
	</main>

	<script th:src="@{/js/common-dashboard.js}"></script>
	<script th:src="@{/js/reports.js}"></script>

	<script th:src="@{/js/pwa.js}"></script>
</body>

</html>
