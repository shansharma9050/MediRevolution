<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>MediRevolution | SaaS Settings</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="manifest" href="/manifest.json">
	<meta name="theme-color" content="#05285f">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body class="dashboard-body">

	<div th:replace="~{layout/saas-topnavbar :: saasTopnavbar}"></div>
	<div th:replace="~{layout/saas-sidebar :: saasSidebar}"></div>

	<main class="mr-main">

		<div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
			<div>
				<h1 class="mr-page-title">SaaS Settings & Branding</h1>
				<p class="mr-page-subtitle">
					Manage branding, contact details, headers, footers and working hours for
					<strong id="tenantNameText">your workspace</strong>.
				</p>
			</div>

			<button id="saveSettingsBtn" class="btn btn-medi" onclick="saveSettings()">Save Settings</button>
		</div>

		<div id="msg"></div>

		<div class="mr-card mb-4">
			<h5 class="mb-3">Business Profile</h5>

			<div class="row g-3">

				<div class="col-md-6">
					<label class="form-label">Business Name *</label>
					<input id="businessName" class="form-control">
				</div>

				<div class="col-md-6">
					<label class="form-label">Business Type</label>
					<input id="businessType" class="form-control" placeholder="Clinic / Hospital / Wholesaler">
				</div>

				<div class="col-md-8">
					<label class="form-label">Logo URL</label>
					<input id="logoUrl" class="form-control" placeholder="/images/logo.png or https://...">
				</div>

				<div class="col-md-4">
					<label class="form-label">Theme Color</label>
					<input id="themeColor" type="color" class="form-control form-control-color" value="#05285f">
				</div>

				<div class="col-md-12">
					<label class="form-label">Address</label>
					<textarea id="address" class="form-control" rows="2"></textarea>
				</div>

				<div class="col-md-3">
					<label class="form-label">City</label>
					<input id="city" class="form-control">
				</div>

				<div class="col-md-3">
					<label class="form-label">State</label>
					<input id="state" class="form-control">
				</div>

				<div class="col-md-3">
					<label class="form-label">Pincode</label>
					<input id="pincode" class="form-control">
				</div>

				<div class="col-md-3">
					<label class="form-label">Country</label>
					<input id="country" class="form-control" value="India">
				</div>

				<div class="col-md-4">
					<label class="form-label">Contact Email</label>
					<input id="contactEmail" class="form-control">
				</div>

				<div class="col-md-4">
					<label class="form-label">Contact Mobile</label>
					<input id="contactMobile" class="form-control">
				</div>

				<div class="col-md-4">
					<label class="form-label">Website</label>
					<input id="website" class="form-control">
				</div>

				<div class="col-md-6">
					<label class="form-label">GST Number</label>
					<input id="gstNumber" class="form-control">
				</div>

				<div class="col-md-6">
					<label class="form-label">Registration Number</label>
					<input id="registrationNumber" class="form-control">
				</div>

			</div>
		</div>

		<div class="mr-card mb-4">
			<h5 class="mb-3">PDF Branding</h5>

			<div class="row g-3">

				<div class="col-md-6">
					<label class="form-label">Invoice Header</label>
					<textarea id="invoiceHeader" class="form-control" rows="2"></textarea>
				</div>

				<div class="col-md-6">
					<label class="form-label">Invoice Footer</label>
					<textarea id="invoiceFooter" class="form-control" rows="2"></textarea>
				</div>

				<div class="col-md-6">
					<label class="form-label">Prescription Header</label>
					<textarea id="prescriptionHeader" class="form-control" rows="2"></textarea>
				</div>

				<div class="col-md-6">
					<label class="form-label">Prescription Footer</label>
					<textarea id="prescriptionFooter" class="form-control" rows="2"></textarea>
				</div>

				<div class="col-md-6">
					<label class="form-label">Report Header</label>
					<textarea id="reportHeader" class="form-control" rows="2"></textarea>
				</div>

				<div class="col-md-6">
					<label class="form-label">Report Footer</label>
					<textarea id="reportFooter" class="form-control" rows="2"></textarea>
				</div>

			</div>
		</div>

		<div class="mr-card mb-4">
			<h5 class="mb-3">Working Hours</h5>

			<div class="row g-3">

				<div class="col-md-4">
					<label class="form-label">Working Days</label>
					<input id="workingDays" class="form-control" placeholder="MONDAY-SATURDAY">
				</div>

				<div class="col-md-4">
					<label class="form-label">Opening Time</label>
					<input id="openingTime" class="form-control" placeholder="09:00 AM">
				</div>

				<div class="col-md-4">
					<label class="form-label">Closing Time</label>
					<input id="closingTime" class="form-control" placeholder="06:00 PM">
				</div>

			</div>
		</div>

		<div class="text-end">
			<button class="btn btn-medi" onclick="saveSettings()">Save Settings</button>
		</div>

		<div th:replace="~{layout/footer :: footer}"></div>

	</main>

	<script th:src="@{/js/common-dashboard.js}"></script>
	<script th:src="@{/js/module-switch.js}"></script>
	<script th:src="@{/js/saas-auth-guard.js}"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/saas-settings.js}"></script>

</body>

</html>
