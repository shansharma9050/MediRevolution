<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>MediRevolution | SaaS Staff</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="manifest" href="/manifest.json">
	<meta name="theme-color" content="#05285f">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body class="dashboard-body">

	<div th:replace="~{layout/saas-topnavbar :: saasTopnavbar}"></div>
	<div th:replace="~{layout/saas-sidebar :: saasSidebar}"></div>

	<main class="mr-main">

		<div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
			<div>
				<h1 class="mr-page-title">SaaS Staff</h1>
				<p class="mr-page-subtitle">
					Manage staff for <strong id="tenantNameText">your workspace</strong>.
				</p>
			</div>

			<button id="addStaffBtn" class="btn btn-medi" data-bs-toggle="modal" data-bs-target="#staffModal"
				onclick="openCreateStaffModal()">
				Add Staff
			</button>
		</div>

		<div id="msg"></div>

		<div class="mr-card mb-4">
			<div class="row g-3 align-items-end">
				<div class="col-md-8">
					<label class="form-label">Search Staff</label>
					<input type="text" id="searchKeyword" class="form-control" placeholder="Search by name or mobile">
				</div>

				<div class="col-md-4">
					<button class="btn btn-medi w-100" onclick="searchStaff()">Search</button>
				</div>
			</div>
		</div>

		<div class="mr-card">
			<div class="table-responsive">
				<table class="table table-hover align-middle">
					<thead>
						<tr>
							<th>Staff Code</th>
							<th>Name</th>
							<th>Role</th>
							<th>Department</th>
							<th>Mobile</th>
							<th>City</th>
							<th>Status</th>
							<th style="width:180px;">Action</th>
						</tr>
					</thead>
					<tbody id="staffTableBody">
						<tr>
							<td colspan="8" class="text-center text-muted py-4">Loading staff...</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div th:replace="~{layout/footer :: footer}"></div>
	</main>

	<div class="modal fade" id="staffModal" tabindex="-1">
		<div class="modal-dialog modal-xl">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title" id="staffModalTitle">Add Staff</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<div class="modal-body">

					<input type="hidden" id="staffId">

					<div class="row g-3">

						<div class="col-md-4">
							<label class="form-label">Staff Name *</label>
							<input type="text" id="staffName" class="form-control">
						</div>

						<div class="col-md-4">
							<label class="form-label">Role *</label>
							<select id="staffRole" class="form-select" onchange="toggleDoctorFields()">
								<option value="">Select</option>
								<option value="ADMIN">Admin</option>
								<option value="DOCTOR">Doctor</option>
								<option value="NURSE">Nurse</option>
								<option value="RECEPTIONIST">Receptionist</option>
								<option value="PHARMACIST">Pharmacist</option>
								<option value="LAB_TECHNICIAN">Lab Technician</option>
								<option value="RADIOLOGY_TECHNICIAN">Radiology Technician</option>
								<option value="ACCOUNTANT">Accountant</option>
								<option value="BILLING_STAFF">Billing Staff</option>
								<option value="WARD_BOY">Ward Boy</option>
								<option value="MANAGER">Manager</option>
								<option value="CLEANING_STAFF">Cleaning Staff</option>
								<option value="SECURITY">Security</option>
								<option value="OTHER">Other</option>
							</select>
						</div>

						<div class="col-md-4">
							<label class="form-label">Email *</label>
							<input type="email" id="email" class="form-control">
						</div>

						<div class="col-md-4">
							<label class="form-label">Mobile *</label>
							<input type="text" id="mobile" class="form-control">
						</div>

						<div class="col-md-4">
							<label class="form-label">Login Password *</label>
							<input type="password" id="password" class="form-control"
								placeholder="Set staff login password">
						</div>

						<div class="col-md-4">
							<label class="form-label">Department</label>
							<input type="text" id="department" class="form-control">
						</div>

						<div class="col-md-4">
							<label class="form-label">Designation</label>
							<input type="text" id="designation" class="form-control">
						</div>

						<div class="col-md-4">
							<label class="form-label">Gender</label>
							<select id="gender" class="form-select">
								<option value="">Select</option>
								<option value="MALE">Male</option>
								<option value="FEMALE">Female</option>
								<option value="OTHER">Other</option>
							</select>
						</div>

						<div class="col-md-4">
							<label class="form-label">Joining Date</label>
							<input type="date" id="joiningDate" class="form-control">
						</div>

						<div class="col-md-4">
							<label class="form-label">Salary</label>
							<input type="number" id="salary" class="form-control">
						</div>

						<div class="col-md-4">
							<label class="form-label">City</label>
							<input type="text" id="city" class="form-control">
						</div>

						<div class="col-md-4">
							<label class="form-label">State</label>
							<input type="text" id="state" class="form-control">
						</div>

						<div class="col-md-4">
							<label class="form-label">Pincode</label>
							<input type="text" id="pincode" class="form-control">
						</div>

						<div class="col-md-4">
							<label class="form-label">Emergency Contact Name</label>
							<input type="text" id="emergencyContactName" class="form-control">
						</div>

						<div class="col-md-4">
							<label class="form-label">Emergency Contact Mobile</label>
							<input type="text" id="emergencyContactMobile" class="form-control">
						</div>

						<div class="col-12">
							<label class="form-label">Address</label>
							<textarea id="address" class="form-control" rows="2"></textarea>
						</div>

					</div>
					
					<div id="doctorExtraFields" class="row g-3 mt-2" style="display: none;">

					    <div class="col-12">
					        <hr>
					        <h6 class="text-primary fw-bold mb-0">Doctor Profile Details</h6>
					        <small class="text-muted">
					            These fields are required only when staff role is Doctor.
					        </small>
					    </div>

					    <div class="col-md-4">
					        <label class="form-label">Qualification</label>
					        <input type="text" id="qualification" class="form-control" placeholder="MBBS, MD, MS">
					    </div>

					    <div class="col-md-4">
					        <label class="form-label">Specialization</label>
					        <input type="text" id="specialization" class="form-control" placeholder="Cardiology, Surgery">
					    </div>

					    <div class="col-md-4">
					        <label class="form-label">Registration Number</label>
					        <input type="text" id="registrationNumber" class="form-control" placeholder="Medical registration no.">
					    </div>

					    <div class="col-md-4">
					        <label class="form-label">Experience Years</label>
					        <input type="number" id="experienceYears" class="form-control" min="0">
					    </div>

					    <div class="col-md-4">
					        <label class="form-label">Consultation Fee</label>
					        <input type="number" id="consultationFee" class="form-control" min="0">
					    </div>

					    <div class="col-md-4">
					        <label class="form-label">Online Consultation Fee</label>
					        <input type="number" id="onlineConsultationFee" class="form-control" min="0">
					    </div>

					    <div class="col-md-4">
					        <label class="form-label">Online Consultation</label>
					        <select id="onlineConsultationEnabled" class="form-select">
					            <option value="false">Disabled</option>
					            <option value="true">Enabled</option>
					        </select>
					    </div>

					</div>

				</div>

				<div class="modal-footer">
					<button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
					<button id="saveStaffBtn" class="btn btn-medi" onclick="saveStaff()">Save Staff</button>
				</div>

			</div>
		</div>
	</div>

	<script th:src="@{/js/common-dashboard.js?v=20260708_4}"></script>
	<script th:src="@{/js/module-switch.js}"></script>
	<script th:src="@{/js/saas-auth-guard.js}"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/saas-staff.js?v=20260708_4}"></script>

</body>

</html>
