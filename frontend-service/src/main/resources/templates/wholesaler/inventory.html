<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>MediRevolution | Inventory</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<link rel="manifest" href="/manifest.json">

	<meta name="theme-color" content="#05285f">

	<meta name="mobile-web-app-capable" content="yes">

	<meta name="apple-mobile-web-app-capable" content="yes">

	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

	<meta name="apple-mobile-web-app-title" content="MediRevolution">

	<link rel="apple-touch-icon" href="/images/icon-192.png">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body class="dashboard-body">

	<div th:replace="~{layout/topnavbar :: topnavbar}"></div>
	<div th:replace="~{layout/sidebar :: sidebar}"></div>
	<main class="mr-main">

		<div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
			<div>
				<h1 class="mr-page-title">Wholesaler Inventory</h1>
				<p class="mr-page-subtitle">
					Manage batch-wise medicine stock, pricing, GST and expiry details.
				</p>
			</div>

			<button class="btn btn-medi" style="width:auto;" onclick="openAddStockPanel()">
				+ Add Stock
			</button>
		</div>

		<div id="msg"></div>

		<div class="row g-4 mb-4">

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title">Stock Items</div>
					<div class="mr-stat-value" id="totalStockItems">0</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title">Total Quantity</div>
					<div class="mr-stat-value" id="totalQuantity">0</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title">Low Stock</div>
					<div class="mr-stat-value" id="lowStockCount">0</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title">Expired/Near</div>
					<div class="mr-stat-value" id="expiryCount">0</div>
				</div>
			</div>

		</div>

		<div class="mr-card mb-4" id="addStockPanel" style="display:none;">
			<div class="d-flex justify-content-between align-items-center mb-3">
				<h5 class="fw-bold text-primary mb-0">Add Medicine Stock</h5>
				<button class="btn btn-sm btn-outline-danger" onclick="closeAddStockPanel()">Close</button>
			</div>

			<div class="row g-3">

				<div class="col-md-6">
					<label class="form-label">Select Medicine</label>
					<select id="medicineId" class="form-select">
						<option value="">Loading medicines...</option>
					</select>
				</div>

				<div class="col-md-6">
					<label class="form-label">Batch Number</label>
					<input type="text" id="batchNumber" class="form-control" placeholder="DL650-B001">
				</div>

				<div class="col-md-6">
					<label class="form-label">Manufacturing Date</label>
					<input type="date" id="manufacturingDate" class="form-control">
				</div>

				<div class="col-md-6">
					<label class="form-label">Expiry Date</label>
					<input type="date" id="expiryDate" class="form-control">
				</div>

				<div class="col-md-6">
					<label class="form-label">Available Quantity</label>
					<input type="number" id="availableQuantity" class="form-control" placeholder="5000">
				</div>

				<div class="col-md-6">
					<label class="form-label">Minimum Stock Level</label>
					<input type="number" id="minimumStockLevel" class="form-control" placeholder="100">
				</div>

				<div class="col-md-4">
					<label class="form-label">MRP</label>
					<input type="number" step="0.01" id="mrp" class="form-control" placeholder="35.00">
				</div>

				<div class="col-md-4">
					<label class="form-label">Wholesale Price</label>
					<input type="number" step="0.01" id="wholesalePrice" class="form-control" placeholder="25.50">
				</div>

				<div class="col-md-4">
					<label class="form-label">PTR</label>
					<input type="number" step="0.01" id="ptr" class="form-control" placeholder="28.00">
				</div>

				<div class="col-md-4">
					<label class="form-label">GST %</label>
					<input type="number" step="0.01" id="gstPercentage" class="form-control" placeholder="12">
				</div>

				<div class="col-md-8 d-flex align-items-end justify-content-end">
					<button class="btn btn-medi" style="width:auto;" onclick="addStock()">
						Save Stock
					</button>
				</div>

			</div>
		</div>

		<div class="mr-card">

			<div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
				<h5 class="fw-bold text-primary mb-0">My Stock Inventory</h5>

				<input type="text" id="searchBox" class="form-control" style="max-width:320px;"
					placeholder="Search medicine, batch, manufacturer" onkeyup="filterStockTable()">
			</div>

			<div class="table-responsive">
				<table class="table align-middle table-hover">
					<thead>
						<tr>
							<th>#</th>
							<th>Medicine</th>
							<th>Batch</th>
							<th>Qty</th>
							<th>Min</th>
							<th>MRP</th>
							<th>Wholesale</th>
							<th>GST</th>
							<th>Expiry</th>
							<th>Status</th>
						</tr>
					</thead>

					<tbody id="stockTable">
						<tr>
							<td colspan="10" class="text-center text-muted py-4">
								Loading inventory...
							</td>
						</tr>
					</tbody>
				</table>
			</div>

		</div>
		<div th:replace="~{layout/footer :: footer}"></div>
	</main>

	<script th:src="@{/js/common-dashboard.js}"></script>
	<script th:src="@{/js/wholesaler-inventory.js}"></script>
	<script th:src="@{/js/pwa.js}"></script>
</body>

</html>
