<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>MediRevolution | Notifications</title>

	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">

</head>

<body class="dashboard-body">

	<nav class="navbar fixed-top mr-navbar px-3 px-lg-4">

		<div class="d-flex align-items-center gap-3">

			<button class="mobile-menu-btn" onclick="toggleSidebar()">
				☰
			</button>

			<a href="/dashboard" class="mr-navbar-brand d-flex align-items-center gap-2">

				<img th:src="@{/images/logo.png}" class="mr-nav-logo">

				Medi<span>Revolution</span>

			</a>

		</div>

		<div class="d-flex align-items-center gap-3">

			<button class="btn btn-light position-relative" onclick="openNotificationDrawer()">

				🔔

				<span id="notificationCount"
					class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
					0
				</span>

			</button>

			<button class="btn btn-outline-light" onclick="logout()">
				Logout
			</button>

		</div>

	</nav>

	<aside class="mr-sidebar" id="sidebar">

		<a href="/dashboard">🏠 Dashboard</a>
		<a href="/orders">📋 Orders</a>
		<a href="/invoices">🧾 Invoices</a>

		<a href="/notifications" class="active">
			🔔 Notifications
		</a>

	</aside>

	<main class="mr-main">

		<div class="d-flex justify-content-between align-items-center mb-4">

			<div>

				<h1 class="mr-page-title">
					Notification Center
				</h1>

				<p class="mr-page-subtitle">
					Track approvals, orders, invoices and stock alerts.
				</p>

			</div>

			<button class="btn btn-medi" style="width:auto;" onclick="markAllRead()">

				Mark All Read

			</button>

		</div>

		<div id="msg"></div>

		<div class="row g-4 mb-4">

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title">Total</div>
					<div class="mr-stat-value" id="totalNotifications">
						0
					</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title">Unread</div>
					<div class="mr-stat-value" id="unreadNotifications">
						0
					</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title">Critical</div>
					<div class="mr-stat-value" id="criticalNotifications">
						0
					</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title">Today</div>
					<div class="mr-stat-value" id="todayNotifications">
						0
					</div>
				</div>
			</div>

		</div>

		<div class="mr-card">

			<div class="d-flex gap-2 flex-wrap mb-3">

				<button class="btn btn-outline-primary" onclick="filterNotifications('ALL')">
					All
				</button>

				<button class="btn btn-outline-primary" onclick="filterNotifications('ORDER')">
					Orders
				</button>

				<button class="btn btn-outline-primary" onclick="filterNotifications('APPROVAL')">
					Approvals
				</button>

				<button class="btn btn-outline-primary" onclick="filterNotifications('INVOICE')">
					Invoices
				</button>

				<button class="btn btn-outline-primary" onclick="filterNotifications('LOW_STOCK')">
					Stock Alerts
				</button>

			</div>

			<div id="notificationList">

			</div>

		</div>

	</main>

	<div id="notificationDrawer" class="notification-drawer">

		<div class="drawer-header">

			<h5>Notifications</h5>

			<button class="btn-close" onclick="closeNotificationDrawer()">
			</button>

		</div>

		<div id="drawerNotifications">

		</div>

	</div>
	<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
	<script th:src="@{/js/common-dashboard.js}"></script>
	<script th:src="@{/js/notifications.js}"></script>

</body>

</html>
