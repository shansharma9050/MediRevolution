<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MediRevolution | Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>
<body>

<div class="auth-page">

    <div class="auth-left">
        <div class="auth-left-content">
            <img th:src="@{/images/logo.png}" alt="MediRevolution Logo">

            <h1>Join Medi<span>Revolution</span></h1>

            <p>
                Create your account as a wholesaler, retailer, doctor or hospital
                and become part of a modern healthcare network.
            </p>

            <p class="mt-4">
                Your account will be reviewed and approved by the admin before access.
            </p>
        </div>
    </div>

    <div class="auth-right">
        <div class="auth-card">

            <img th:src="@{/images/logo.png}" class="auth-logo-small" alt="Logo">

            <div class="auth-title">Create Account</div>
            <div class="auth-subtitle">Start your MediRevolution journey</div>

            <div id="msg"></div>

            <div class="mb-3">
                <label class="form-label">Full Name / Business Name</label>
                <input type="text" id="fullName" class="form-control" placeholder="Enter name">
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="example@email.com">
            </div>

            <div class="mb-3">
                <label class="form-label">Mobile Number</label>
                <input type="text" id="mobile" class="form-control" placeholder="Enter mobile number">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Create password">
            </div>

            <div class="mb-3">
                <label class="form-label">Register As</label>
                <select id="role" class="form-select">
                    <option value="">Select Role</option>
                    <option value="WHOLESALER">Medicine Wholesaler</option>
                    <option value="RETAILER">Retailer / Medical Store</option>
                    <option value="DOCTOR">Doctor</option>
                    <option value="HOSPITAL">Hospital</option>
                </select>
            </div>

            <button class="btn btn-medi mt-2" onclick="register()">Register</button>

            <p class="text-center mt-4 mb-0">
                Already have account?
                <a href="/" class="green-link">Login</a>
            </p>

        </div>
    </div>

</div>

<script th:src="@{/js/auth.js}"></script>
</body>
</html>
