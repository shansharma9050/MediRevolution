<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>MediRevolution | SaaS Workspaces</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="manifest" href="/manifest.json">
	<meta name="theme-color" content="#05285f">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body class="dashboard-body">

	<div th:replace="~{layout/saas-topnavbar :: saasTopnavbar}"></div>
	<div th:replace="~{layout/saas-sidebar :: saasSidebar}"></div>

	<main class="mr-main">

		<div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
			<div>
				<h1 class="mr-page-title">SaaS Workspaces</h1>
				<p class="mr-page-subtitle" id="workspaceSubtitle">
					Create or select your personal clinic, hospital or wholesaler software.
				</p>
			</div>

			<button id="createWorkspaceBtn" class="btn btn-medi" data-bs-toggle="modal"
				data-bs-target="#createTenantModal">
				Create Workspace
			</button>
		</div>

		<div id="msg"></div>

		<div class="row g-4" id="tenantContainer"></div>

		<div th:replace="~{layout/footer :: footer}"></div>
	</main>

	<div class="modal fade" id="createTenantModal" tabindex="-1">
		<div class="modal-dialog modal-lg">
			<div class="modal-content">

				<div class="modal-header">
					<h5 class="modal-title">Create SaaS Workspace</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>

				<div class="modal-body">

					<div class="row g-3">

						<div class="col-md-6">
							<label class="form-label">Workspace Name *</label>
							<input type="text" id="tenantName" class="form-control"
								placeholder="Example: CityCare Hospital">
						</div>

						<div class="col-md-6">
							<label class="form-label">Contact Email</label>
							<input type="email" id="contactEmail" class="form-control">
						</div>

						<div class="col-md-6">
							<label class="form-label">Contact Mobile</label>
							<input type="text" id="contactMobile" class="form-control">
						</div>

						<div class="col-md-6">
							<label class="form-label">City</label>
							<input type="text" id="city" class="form-control">
						</div>

						<div class="col-md-6">
							<label class="form-label">State</label>
							<input type="text" id="state" class="form-control">
						</div>

						<div class="col-md-6">
							<label class="form-label">Pincode</label>
							<input type="text" id="pincode" class="form-control">
						</div>

						<div class="col-12">
							<label class="form-label">Address</label>
							<textarea id="address" class="form-control" rows="2"></textarea>
						</div>

					</div>

				</div>

				<div class="modal-footer">
					<button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
					<button class="btn btn-medi" onclick="createTenant()">Create Workspace</button>
				</div>

			</div>
		</div>
	</div>

	<script th:src="@{/js/common-dashboard.js}"></script>
	<script th:src="@{/js/module-switch.js}"></script>
	<script th:src="@{/js/saas-auth-guard.js}"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/saas-workspaces.js?v=20260707_3}"></script>

</body>

</html>
