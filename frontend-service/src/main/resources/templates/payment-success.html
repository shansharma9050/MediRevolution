<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Success | MediRevolution</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/medirevolution.css}" rel="stylesheet">

    <style>
        :root {
            --mr-primary: #053b78;
            --mr-secondary: #06b6c9;
            --mr-success: #16a34a;
            --mr-danger: #dc2626;
            --mr-bg-light: #eef8fb;
            --mr-card: rgba(255, 255, 255, 0.95);
            --mr-text: #0f172a;
            --mr-muted: #64748b;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.35), transparent 25%),
                linear-gradient(135deg, #063b78 0%, #06a6bd 48%, #1cc7bd 100%);
            overflow-x: hidden;
        }

        .payment-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        .payment-page::before,
        .payment-page::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.14);
            filter: blur(2px);
        }

        .payment-page::before {
            width: 260px;
            height: 260px;
            top: -90px;
            right: 12%;
        }

        .payment-page::after {
            width: 190px;
            height: 190px;
            bottom: -60px;
            left: 8%;
        }

        .payment-card {
            width: 100%;
            max-width: 520px;
            background: var(--mr-card);
            border-radius: 28px;
            padding: 34px 32px;
            text-align: center;
            position: relative;
            z-index: 2;
            box-shadow:
                0 28px 70px rgba(2, 31, 70, 0.35),
                inset 0 1px 0 rgba(255,255,255,0.75);
            border: 1px solid rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
        }

        .brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(5,59,120,0.10), rgba(6,182,201,0.14));
            color: var(--mr-primary);
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 18px;
        }

        .status-icon-wrap {
            width: 92px;
            height: 92px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            box-shadow: 0 16px 34px rgba(22, 163, 74, 0.25);
            animation: popIn 0.45s ease-out;
        }

        .status-icon {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(135deg, #16a34a, #22c55e);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 34px;
            font-weight: 900;
        }

        .status-icon.failed {
            background: linear-gradient(135deg, #dc2626, #ef4444);
        }

        .status-icon-wrap.failed {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            box-shadow: 0 16px 34px rgba(220, 38, 38, 0.22);
        }

        @keyframes popIn {
            from {
                transform: scale(0.75);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .payment-title {
            font-size: 30px;
            font-weight: 800;
            color: var(--mr-primary);
            margin-bottom: 10px;
        }

        .payment-message {
            color: var(--mr-muted);
            font-size: 16px;
            line-height: 1.55;
            margin-bottom: 22px;
        }

        .payment-info-card {
            background: linear-gradient(135deg, #eefcff, #e8f7ff);
            border: 1px solid rgba(6, 182, 201, 0.28);
            border-radius: 18px;
            padding: 18px;
            text-align: left;
            margin-top: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 8px 0;
            border-bottom: 1px dashed rgba(5, 59, 120, 0.16);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--mr-muted);
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .info-value {
            color: var(--mr-text);
            font-size: 14px;
            font-weight: 700;
            text-align: right;
            word-break: break-word;
        }

        .result-box .alert {
            border-radius: 16px;
            font-weight: 600;
            border: none;
            padding: 14px 16px;
            margin-bottom: 0;
        }

        .btn-medi-payment {
            width: 100%;
            border: none;
            border-radius: 16px;
            padding: 14px 20px;
            margin-top: 24px;
            color: white;
            font-weight: 800;
            letter-spacing: 0.2px;
            background: linear-gradient(135deg, var(--mr-primary), var(--mr-secondary));
            box-shadow: 0 16px 32px rgba(5, 59, 120, 0.28);
            transition: all 0.25s ease;
            text-decoration: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-medi-payment:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 20px 38px rgba(5, 59, 120, 0.36);
        }

        .secure-note {
            margin-top: 18px;
            color: var(--mr-muted);
            font-size: 13px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .loader {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 4px solid rgba(6, 182, 201, 0.18);
            border-top-color: var(--mr-secondary);
            margin: 0 auto 20px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 576px) {
            .payment-card {
                padding: 28px 20px;
                border-radius: 22px;
            }

            .payment-title {
                font-size: 25px;
            }

            .info-row {
                flex-direction: column;
                gap: 4px;
            }

            .info-value {
                text-align: left;
            }
        }
    </style>
</head>

<body>

<div class="payment-page">
    <div class="payment-card">

        <div class="brand-badge">
            🩺 MediRevolution
        </div>

        <div id="loaderBox">
            <div class="loader"></div>
        </div>

        <div id="statusIconBox" class="status-icon-wrap d-none">
            <div id="statusIcon" class="status-icon">✓</div>
        </div>

        <h2 class="payment-title" id="paymentTitle">Payment Verification</h2>

        <p class="payment-message" id="paymentMessage">
            Please wait, we are securely verifying your payment and confirming your appointment.
        </p>

        <div class="payment-info-card">
            <div class="info-row">
                <span class="info-label">Appointment ID</span>
                <span class="info-value" id="appointmentIdText">-</span>
            </div>

            <div class="info-row">
                <span class="info-label">Merchant Order ID</span>
                <span class="info-value" id="merchantOrderIdText">-</span>
            </div>
        </div>

        <div id="resultBox" class="result-box mt-3"></div>

        <a href="/appointments/my" class="btn-medi-payment">
            Go to My Appointments →
        </a>

        <div class="secure-note">
            🔒 Secure payment verification powered by MediRevolution
        </div>

    </div>
</div>

<script th:src="@{/js/common-dashboard.js}"></script>

<script>
    document.addEventListener("DOMContentLoaded", verifyPayment);

    async function verifyPayment() {
        const params = new URLSearchParams(window.location.search);

        const appointmentId = params.get("appointmentId");
        const merchantOrderId = params.get("merchantOrderId");

        document.getElementById("appointmentIdText").innerText = appointmentId || "-";
        document.getElementById("merchantOrderIdText").innerText = merchantOrderId || "-";

        if (!appointmentId || !merchantOrderId) {
            showFailed("Payment response is missing appointmentId or merchantOrderId.");
            return;
        }

        try {
            const response = await fetch(
                `${API_BASE}/doctor/payments/verify?appointmentId=${appointmentId}&merchantOrderId=${encodeURIComponent(merchantOrderId)}`,
                {
                    method: "POST"
                }
            );

            const result = await response.json();

            if (!response.ok) {
                showFailed(result.message || "Payment verification failed.");
                return;
            }

            showSuccess();

        } catch (e) {
            showFailed("Unable to verify payment. Please refresh this page or check My Appointments.");
        }
    }

    function showSuccess() {
        document.getElementById("loaderBox").classList.add("d-none");

        const iconBox = document.getElementById("statusIconBox");
        const icon = document.getElementById("statusIcon");

        iconBox.classList.remove("d-none", "failed");
        icon.classList.remove("failed");
        icon.innerText = "✓";

        document.getElementById("paymentTitle").innerText = "Payment Successful";
        document.getElementById("paymentMessage").innerText =
            "Your payment has been verified successfully. Your appointment is now confirmed.";

        document.getElementById("resultBox").innerHTML =
            `<div class="alert alert-success">
                Appointment confirmed successfully.
            </div>`;
    }

    function showFailed(message) {
        document.getElementById("loaderBox").classList.add("d-none");

        const iconBox = document.getElementById("statusIconBox");
        const icon = document.getElementById("statusIcon");

        iconBox.classList.remove("d-none");
        iconBox.classList.add("failed");
        icon.classList.add("failed");
        icon.innerText = "×";

        document.getElementById("paymentTitle").innerText = "Payment Verification Failed";
        document.getElementById("paymentMessage").innerText = message;

        document.getElementById("resultBox").innerHTML =
            `<div class="alert alert-danger">
                ${message}
            </div>`;
    }
</script>

</body>
</html>
