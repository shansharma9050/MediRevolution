<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>MediRevolution | SaaS Reports</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="manifest" href="/manifest.json">
	<meta name="theme-color" content="#05285f">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body class="dashboard-body">

	<div th:replace="~{layout/saas-topnavbar :: saasTopnavbar}"></div>
	<div th:replace="~{layout/saas-sidebar :: saasSidebar}"></div>

	<main class="mr-main">

		<div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
			<div>
				<h1 class="mr-page-title">SaaS Reports</h1>
				<p class="mr-page-subtitle">
					Reports and analytics for
					<strong id="tenantNameText">your workspace</strong>.
				</p>
			</div>
		</div>

		<div id="msg"></div>

		<div class="row g-3 mb-4" id="dashboardCards">
			<div class="col-md-3">
				<div class="mr-card text-center">
					<h3 id="totalPatients">0</h3>
					<p class="mb-0">Patients</p>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-card text-center">
					<h3 id="totalAppointments">0</h3>
					<p class="mb-0">Appointments</p>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-card text-center">
					<h3 id="totalBilling">₹0</h3>
					<p class="mb-0">Total Billing</p>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-card text-center">
					<h3 id="totalDue">₹0</h3>
					<p class="mb-0">Due Amount</p>
				</div>
			</div>
		</div>

		<div class="mr-card mb-4">
			<div class="row g-3 align-items-end">

				<div class="col-md-3">
					<label class="form-label">Report Type</label>
					<select id="reportType" class="form-select">
						<option value="patients">Patient Report</option>
						<option value="appointments">Appointment Report</option>
						<option value="opd">OPD Report</option>
						<option value="ipd">IPD Report</option>
						<option value="billing">Billing Report</option>
						<option value="pharmacy">Pharmacy Sales Report</option>
						<option value="low-stock">Low Stock Report</option>
						<option value="lab">Lab Report</option>
						<option value="radiology">Radiology Report</option>
					</select>
				</div>

				<div class="col-md-3">
					<label class="form-label">From Date</label>
					<input type="date" id="fromDate" class="form-control">
				</div>

				<div class="col-md-3">
					<label class="form-label">To Date</label>
					<input type="date" id="toDate" class="form-control">
				</div>

				<div class="col-md-3">
					<button class="btn btn-medi w-100" onclick="loadSelectedReport()">
						Load Report
					</button>
				</div>

			</div>
		</div>

		<div class="mr-card">
			<div class="d-flex justify-content-between align-items-center mb-3">
				<h5 id="reportTitle" class="mb-0">Report</h5>
				<button class="btn btn-outline-secondary export-report-btn" onclick="exportTableToCsv()">
					Export CSV
				</button>
			</div>

			<div class="table-responsive">
				<table class="table table-hover align-middle" id="reportTable">
					<thead id="reportTableHead"></thead>
					<tbody id="reportTableBody">
						<tr>
							<td class="text-center text-muted py-4">
								Select report and click Load Report.
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div th:replace="~{layout/footer :: footer}"></div>

	</main>

	<script th:src="@{/js/common-dashboard.js}"></script>
	<script th:src="@{/js/module-switch.js}"></script>
	<script th:src="@{/js/saas-auth-guard.js}"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<script th:src="@{/js/saas-reports.js}"></script>

</body>

</html>
