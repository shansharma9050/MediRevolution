<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>MediRevolution | Forgot Password</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="manifest" href="/manifest.json">
	<meta name="theme-color" content="#05285f">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-capable" content="yes">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body>

	<div class="auth-page">

		<div class="auth-left">
			<div class="auth-left-content">

				<div class="hero-badge">
					Secure Account Recovery
				</div>

				<img th:src="@{/images/logo.png}" class="hero-logo" alt="MediRevolution Logo">

				<h1 class="hero-title">
					Medi<span>Revolution</span>
				</h1>

				<p class="hero-description">
					Reset your password securely using email OTP verification.
				</p>

				<div class="feature-list">
					<div>✔ Email OTP Verification</div>
					<div>✔ Secure Password Reset</div>
					<div>✔ Account Protection</div>
					<div>✔ Fast Login Recovery</div>
				</div>

			</div>
		</div>

		<div class="auth-right">

			<div class="auth-card">

				<div class="login-header">

					<img th:src="@{/images/logo.png}" class="auth-logo-small" alt="MediRevolution Logo">

					<h2>Forgot Password</h2>

					<p>
						Enter your registered email to reset your password
					</p>

				</div>

				<div id="msg"></div>

				<!-- STEP 1: EMAIL -->
				<div id="forgotEmailSection">

					<div class="mb-3">
						<label>Email Address</label>
						<input type="email" id="forgotEmail" class="form-control form-control-lg"
							placeholder="Enter your registered email">
					</div>

					<button type="button" id="sendForgotOtpBtn" class="btn btn-login" onclick="sendForgotPasswordOtp()">
						Send OTP
					</button>

				</div>

				<!-- STEP 2: OTP -->
				<div id="forgotOtpSection" style="display:none;">

					<div class="mb-3">
						<label>Enter OTP</label>
						<input type="text" id="forgotOtp" maxlength="6" class="form-control form-control-lg"
							placeholder="Enter OTP sent to email">
					</div>

					<button type="button" id="verifyForgotOtpBtn" class="btn btn-login"
						onclick="verifyForgotPasswordOtp()">
						Verify OTP
					</button>

				</div>

				<!-- STEP 3: RESET PASSWORD -->
				<div id="resetPasswordSection" style="display:none;">

					<div class="mb-3">
						<label>New Password</label>

						<div class="input-group">
							<input type="password" id="newPassword" class="form-control form-control-lg"
								placeholder="Enter new password">

							<button type="button" class="btn btn-outline-secondary"
								onclick="toggleForgotPassword('newPassword')">
								👁
							</button>
						</div>
					</div>

					<div class="mb-3">
						<label>Confirm New Password</label>

						<div class="input-group">
							<input type="password" id="confirmNewPassword" class="form-control form-control-lg"
								placeholder="Re-enter new password">

							<button type="button" class="btn btn-outline-secondary"
								onclick="toggleForgotPassword('confirmNewPassword')">
								👁
							</button>
						</div>
					</div>

					<button type="button" id="resetPasswordBtn" class="btn btn-login" onclick="resetForgotPassword()">
						Reset Password
					</button>

				</div>

				<p class="text-center mt-3">
					Remember password?
					<a href="/">
						Login
					</a>
				</p>

			</div>

		</div>

	</div>

	<script th:src="@{/js/auth.js}"></script>
	<script th:src="@{/js/forgot-password.js}"></script>

</body>

</html>
