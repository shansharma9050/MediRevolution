<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>MediRevolution | Cart</title>

	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body class="dashboard-body">

	<nav class="navbar fixed-top mr-navbar px-3 px-lg-4">

		<div class="d-flex align-items-center gap-3">

			<button class="mobile-menu-btn" onclick="toggleSidebar()">
				☰
			</button>

			<a href="/dashboard" class="mr-navbar-brand d-flex align-items-center gap-2">

				<img th:src="@{/images/logo.png}" class="mr-nav-logo">

				Medi<span>Revolution</span>

			</a>

		</div>

		<div class="d-flex align-items-center gap-3">

			<div class="mr-user-pill">
				<span id="userEmail"></span>
			</div>

			<button class="btn btn-outline-light" onclick="logout()">
				Logout
			</button>

		</div>

	</nav>

	<aside class="mr-sidebar" id="sidebar">

		<a th:href="@{/dashboard}">🏠 Dashboard</a>

		<a th:href="@{/retailer/search-medicines}">🔍 Search Medicines</a>

		<a th:href="@{/retailer/cart}" class="active">
			🛒 Cart
		</a>

		<a th:href="@{/orders}">📋 Orders</a>

		<a href="#">🧾 Invoices</a>

	</aside>

	<main class="mr-main">

		<div class="d-flex justify-content-between align-items-center mb-4">

			<div>

				<h1 class="mr-page-title">
					Shopping Cart
				</h1>

				<p class="mr-page-subtitle">
					Review medicines before placing order.
				</p>

			</div>

		</div>

		<div id="msg"></div>

		<div class="row g-4">

			<div class="col-lg-8">

				<div class="mr-card">

					<h5 class="fw-bold text-primary mb-3">
						Cart Items
					</h5>

					<div class="table-responsive">

						<table class="table">

							<thead>

								<tr>
									<th>Medicine</th>
									<th>Batch</th>
									<th>Qty</th>
									<th>Price</th>
									<th>Total</th>
									<th></th>
								</tr>

							</thead>

							<tbody id="cartTable">

							</tbody>

						</table>

					</div>

				</div>

			</div>

			<div class="col-lg-4">

				<div class="mr-card">

					<h5 class="fw-bold text-primary mb-3">
						Order Summary
					</h5>

					<div class="mb-2">
						Items :
						<strong id="itemCount">0</strong>
					</div>

					<div class="mb-2">
						Subtotal :
						<strong id="subTotal">0</strong>
					</div>

					<div class="mb-2">
						GST :
						<strong id="gstTotal">0</strong>
					</div>

					<hr>

					<h4 class="fw-bold">
						₹ <span id="grandTotal">0</span>
					</h4>

					<button class="btn btn-medi mt-3" onclick="placeOrder()">
						Place Order
					</button>

				</div>

			</div>

		</div>

	</main>

	<script th:src="@{/js/common-dashboard.js}"></script>
	<script th:src="@{/js/cart.js}"></script>

</body>

</html>
