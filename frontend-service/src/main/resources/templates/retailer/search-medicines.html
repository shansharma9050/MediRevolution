<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>MediRevolution | Search Medicines</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body class="dashboard-body">

	<div th:replace="~{layout/topnavbar :: topnavbar}"></div>
	<div th:replace="~{layout/sidebar :: sidebar}"></div>

	<main class="mr-main">

		<div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
			<div>
				<h1 class="mr-page-title">Search Medicines</h1>
				<p class="mr-page-subtitle">
					Search available medicines from verified wholesalers and compare stock, price and expiry.
				</p>
			</div>

			<a th:href="@{/retailer/cart}" class="btn btn-medi" style="width:auto;">
				🛒 View Cart <span id="cartCountBadge" class="badge bg-light text-dark ms-1">0</span>
			</a>
		</div>

		<div id="msg"></div>

		<div class="row g-4 mb-4">

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title">Search Results</div>
					<div class="mr-stat-value" id="resultCount">0</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title">Available Stock</div>
					<div class="mr-stat-value" id="availableStockCount">0</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title">Cart Items</div>
					<div class="mr-stat-value" id="cartCountCard">0</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="mr-stat-card">
					<div class="mr-stat-title">Module</div>
					<div class="mr-stat-value">Retail</div>
				</div>
			</div>

		</div>

		<div class="mr-card mb-4">

			<h5 class="fw-bold text-primary mb-3">Find Medicine</h5>

			<div class="row g-3 align-items-end">

				<div class="col-md-8">
					<label class="form-label">Medicine / Brand Name</label>
					<input type="text" id="keyword" class="form-control"
						placeholder="Search e.g. Dolo, Paracetamol, Azithromycin" onkeyup="searchOnEnter(event)">
				</div>

				<div class="col-md-4">
					<button class="btn btn-medi" onclick="searchMedicineStock()">
						Search Medicine
					</button>
				</div>

			</div>

		</div>

		<div class="mr-card">

			<div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
				<h5 class="fw-bold text-primary mb-0">Available Wholesaler Stock</h5>

				<select id="sortOption" class="form-select" style="max-width:260px;" onchange="sortResults()">
					<option value="">Sort Results</option>
					<option value="priceLow">Price Low to High</option>
					<option value="priceHigh">Price High to Low</option>
					<option value="qtyHigh">Quantity High to Low</option>
					<option value="expiryFar">Expiry Far First</option>
				</select>
			</div>

			<div id="stockResultContainer" class="row g-4">
				<div class="col-12">
					<div class="text-center text-muted py-5">
						Search medicine to view available stock.
					</div>
				</div>
			</div>

		</div>
		<div th:replace="~{layout/footer :: footer}"></div>
	</main>

	<script th:src="@{/js/common-dashboard.js}"></script>
	<script th:src="@{/js/retailer-search-medicines.js}"></script>

</body>

</html>
