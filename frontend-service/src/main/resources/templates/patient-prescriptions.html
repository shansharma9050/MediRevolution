<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>MediRevolution | My Prescriptions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#05285f">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body class="dashboard-body">

<nav class="navbar fixed-top mr-navbar px-3 px-lg-4">
    <div class="d-flex align-items-center gap-3">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>

        <a href="/dashboard" class="mr-navbar-brand d-flex align-items-center gap-2">
            <img th:src="@{/images/logo.png}" class="mr-nav-logo">
            Medi<span>Revolution</span>
        </a>
    </div>

    <div class="d-flex align-items-center gap-3">
        <div class="mr-user-pill">
            <span id="userEmail">patient@email.com</span>
        </div>

        <button class="btn btn-outline-light" onclick="logout()">
            Logout
        </button>
    </div>
</nav>

<aside class="mr-sidebar" id="sidebar">
    <a href="/dashboard">🏠 Main Dashboard</a>
    <a href="/patient/dashboard">👤 Patient Dashboard</a>
    <a href="/patient/appointments">📅 My Appointments</a>
    <a href="/patient/prescriptions" class="active">💊 My Prescriptions</a>
    <a href="/profile">👤 Profile</a>
</aside>

<main class="mr-main">

    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
        <div>
            <h1 class="mr-page-title">My Prescriptions</h1>
            <p class="mr-page-subtitle">
                View prescriptions created by your doctor.
            </p>
        </div>
    </div>

    <div id="msg"></div>

    <div class="mr-card">
        <h5 class="fw-bold text-primary mb-3">Prescription History</h5>
        <div id="patientPrescriptionList"></div>
    </div>

</main>

<script th:src="@{/js/common-dashboard.js}"></script>
<script th:src="@{/js/patient-prescriptions.js}"></script>
<script th:src="@{/js/pwa.js}"></script>

</body>
</html>
