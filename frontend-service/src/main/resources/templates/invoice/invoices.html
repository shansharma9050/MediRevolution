<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>MediRevolution | Invoices</title>

	<meta name="viewport" content="width=device-width, initial-scale=1">

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">

</head>

<body class="dashboard-body">

	<nav class="navbar fixed-top mr-navbar px-3 px-lg-4">

		<div class="d-flex align-items-center gap-3">

			<button class="mobile-menu-btn" onclick="toggleSidebar()">
				☰
			</button>

			<a href="/dashboard" class="mr-navbar-brand d-flex align-items-center gap-2">

				<img th:src="@{/images/logo.png}" class="mr-nav-logo">

				Medi<span>Revolution</span>

			</a>

		</div>

		<div class="d-flex align-items-center gap-3">

			<div class="mr-user-pill">
				<span id="userEmail"></span>
			</div>

			<button class="btn btn-light position-relative"
			        onclick="window.location='/notifications'">

			    🔔

			    <span id="notificationCount"
			          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">

			        0

			    </span>

			</button>
			<button class="btn btn-outline-light" onclick="logout()">
				Logout
			</button>

		</div>

	</nav>

	<aside class="mr-sidebar" id="sidebar">

		<a href="/dashboard">🏠 Dashboard</a>

		<a href="/orders">📋 Orders</a>

		<a href="/invoices" class="active">
			🧾 Invoices
		</a>

	</aside>

	<main class="mr-main">

		<div class="d-flex justify-content-between align-items-center mb-4">

			<div>

				<h1 class="mr-page-title">
					Invoice Management
				</h1>

				<p class="mr-page-subtitle">
					Generate, view and download GST invoices.
				</p>

			</div>

		</div>

		<div id="msg"></div>

		<div class="row">

			<div class="col-lg-4">

				<div class="mr-card">

					<h5 class="fw-bold text-primary mb-3">
						Search Invoice
					</h5>

					<label class="form-label">
						Order ID
					</label>

					<input type="text" id="invoiceOrderId" class="form-control">

					<button class="btn btn-medi mt-3" onclick="loadInvoice()">

						View Invoice

					</button>

					<button id="generateBtn" class="btn btn-success mt-2 w-100" onclick="generateInvoice()">

						Generate Invoice

					</button>

				</div>

			</div>

			<div class="col-lg-8">

				<div class="mr-card">

					<div id="invoiceContainer">

						<div class="text-center text-muted py-5">

							Enter Order ID and click View Invoice

						</div>

					</div>

				</div>

			</div>

		</div>

	</main>
	<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
	<script th:src="@{/js/common-dashboard.js}"></script>
	<script th:src="@{/js/invoices.js}"></script>

</body>

</html>
