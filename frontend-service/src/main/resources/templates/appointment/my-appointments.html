<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MediRevolution | My Appointments</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#05285f">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body class="dashboard-body">

<nav class="navbar fixed-top mr-navbar px-3 px-lg-4">
    <div class="d-flex align-items-center gap-3">
        <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
        <a href="/dashboard" class="mr-navbar-brand d-flex align-items-center gap-2">
            <img th:src="@{/images/logo.png}" class="mr-nav-logo">
            Medi<span>Revolution</span>
        </a>
    </div>

    <div class="d-flex align-items-center gap-3">
        <div class="mr-user-pill"><span id="userEmail">user@email.com</span></div>
        <button class="btn btn-light position-relative" onclick="window.location='/notifications'">
            🔔 <span id="notificationCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
        </button>
        <button class="btn btn-outline-light" onclick="logout()">Logout</button>
    </div>
</nav>

<aside class="mr-sidebar" id="sidebar">
    <a th:href="@{/dashboard}">🏠 Dashboard</a>
	<a th:href="@{/appointments/book}" data-role="PATIENT">📅 Book Appointment</a>
	<a th:href="@{/appointments/my}" data-role="PATIENT">📋 My Appointments</a>
	<a th:href="@{/patient/prescriptions}" data-role="PATIENT">💊 My Prescriptions</a>
    <a th:href="@{/profile}">👤 Profile</a>
</aside>

<main class="mr-main">

    <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
        <div>
            <h1 class="mr-page-title">My Appointments</h1>
            <p class="mr-page-subtitle">Track doctor and hospital appointments.</p>
        </div>

        <button class="btn btn-medi" style="width:auto;" onclick="loadMyAppointments()">Refresh</button>
    </div>

    <div id="msg"></div>

    <div class="mr-card mb-4">
        <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-outline-primary" onclick="setType('DOCTOR')">Doctor Appointments</button>
            <button class="btn btn-outline-primary" onclick="setType('HOSPITAL')">Hospital Appointments</button>
        </div>
    </div>

    <div class="mr-card">
        <h5 class="fw-bold text-primary mb-3" id="listTitle">Doctor Appointments</h5>
        <div id="appointmentList"></div>
    </div>

</main>

<script th:src="@{/js/common-dashboard.js}"></script>
<script th:src="@{/js/my-appointments.js?v=4}"></script>
<script th:src="@{/js/pwa.js}"></script>

</body>
</html>
