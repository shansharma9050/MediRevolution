<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>MediRevolution | Doctor Appointment Requests</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="manifest" href="/manifest.json">
	<meta name="theme-color" content="#05285f">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/css/medirevolution.css}" rel="stylesheet">
</head>

<body class="dashboard-body">

	<nav class="navbar fixed-top mr-navbar px-3 px-lg-4">
		<div class="d-flex align-items-center gap-3">
			<button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
			<a href="/dashboard" class="mr-navbar-brand d-flex align-items-center gap-2">
				<img th:src="@{/images/logo.png}" class="mr-nav-logo">
				Medi<span>Revolution</span>
			</a>
		</div>

		<div class="d-flex align-items-center gap-3">
			<div class="mr-user-pill"><span id="userEmail">doctor@email.com</span></div>
			<button class="btn btn-light position-relative" onclick="window.location='/notifications'">
				🔔 <span id="notificationCount"
					class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
			</button>
			<button class="btn btn-outline-light" onclick="logout()">Logout</button>
		</div>
	</nav>

	<aside class="mr-sidebar" id="sidebar">
		<a href="/dashboard">🏠 Main Dashboard</a>
		<a href="/doctor/dashboard">🩺 Doctor Dashboard</a>
		<a href="/doctor/availability">🕒 Availability</a>
		<a href="/doctor/appointment-requests" class="active">📅 Appointment Requests</a>
		<a href="/doctor/patients">👨‍⚕️ Patients</a>
		<a href="/doctor/prescriptions">💊 Prescriptions</a>
		<a href="/doctor/reports">📊 Reports</a>
		<a href="/profile">👤 Profile</a>
	</aside>

	<main class="mr-main">

		<div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
			<div>
				<h1 class="mr-page-title">Appointment Requests</h1>
				<p class="mr-page-subtitle">Approve, reject, complete or cancel online appointment requests.</p>
			</div>

			<button class="btn btn-medi" style="width:auto;" onclick="loadDoctorAppointments()">Refresh</button>
		</div>

		<div id="msg"></div>

		<div class="mr-card">
			<div class="d-flex justify-content-between flex-wrap gap-3 mb-3">
				<h5 class="fw-bold text-primary mb-0">Doctor Appointments</h5>

				<select id="statusFilter" class="form-select" style="max-width:220px;" onchange="filterAppointments()">
					<option value="">All Status</option>
					<option value="PENDING">Pending</option>
					<option value="CONFIRMED">Confirmed</option>
					<option value="REJECTED">Rejected</option>
					<option value="COMPLETED">Completed</option>
					<option value="CANCELLED">Cancelled</option>
				</select>
			</div>

			<div id="appointmentList"></div>
		</div>

	</main>

	<script th:src="@{/js/common-dashboard.js}"></script>
	<script th:src="@{/js/doctor-appointment-requests.js}"></script>
	<script th:src="@{/js/pwa.js}"></script>

</body>

</html>
