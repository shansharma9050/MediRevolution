server.port=8084

spring.application.name=order-service

# DATABASE CONFIG
spring.datasource.url=jdbc:postgresql://localhost:5432/medirevolution_order
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE CONFIG
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# HIKARI CONNECTION POOL - VERY IMPORTANT FOR MULTIPLE MICROSERVICES
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# EUREKA CONFIG
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# JWT CONFIG
jwt.secret=7f4b5f12e1d64df1a8a7d19e6d3b91a87f4b5f12e1d64df1a8a7d19e6d3b91a8